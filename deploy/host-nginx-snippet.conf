# 1) DNS：get.fs-hck.top 的 A 记录指向服务器公网 IP
# 2) 安全组/防火墙放行 80（及 443 若以后上 HTTPS）
# 3) sudo cp 本文件到 /etc/nginx/sites-available/random-notes.conf
#    sudo ln -sf /etc/nginx/sites-available/random-notes.conf /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
# Docker 仍在 8080（deploy/.env 的 WEB_PORT），勿关。

upstream random_notes_web {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name get.fs-hck.top;

    location /notes/ {
        proxy_pass http://random_notes_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：根路径提示
    location = / {
        return 302 /notes/;
    }
}
